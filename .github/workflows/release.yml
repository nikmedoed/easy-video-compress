name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            python: '3.12'
          - os: macos-13
            platform: macos-x64
            python: '3.12'
          - os: macos-latest
            platform: macos-arm64
            python: '3.12'
          - os: ubuntu-latest
            platform: linux-x64
            python: '3.12'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Build executable
        run: python scripts/build.py --install-deps

      - name: Package release asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $platform = "${{ matrix.platform }}"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

          if ("${{ runner.os }}" -eq "Windows") {
            $asset = "release-assets/EasyMediaCompress-$tag-$platform.exe"
            Copy-Item -LiteralPath "dist/EasyMediaCompress.exe" -Destination $asset -Force
          } else {
            $asset = "release-assets/EasyMediaCompress-$tag-$platform.tar.gz"
            tar -czf $asset -C dist EasyMediaCompress
          }

          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: EasyMediaCompress-${{ github.ref_name }}-${{ matrix.platform }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release-assets/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
