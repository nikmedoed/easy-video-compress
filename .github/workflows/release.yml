name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v0.2.0'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            python: '3.12'
          - os: macos-latest
            platform: macos-arm64
            python: '3.12'
          - os: ubuntu-latest
            platform: linux-x64
            python: '3.12'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Build executable
        run: python scripts/build.py --install-deps --version "${{ inputs.tag || github.ref_name }}"

      - name: Package release asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ inputs.tag }}" -ne "") {
            $tag = "${{ inputs.tag }}"
          }
          $platform = "${{ matrix.platform }}"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

          if ("${{ runner.os }}" -eq "Windows") {
            $asset = "release-assets/EasyMediaCompress-$tag-$platform.exe"
            Copy-Item -LiteralPath "dist/EasyMediaCompress.exe" -Destination $asset -Force
          } else {
            $asset = "release-assets/EasyMediaCompress-$tag-$platform.tar.gz"
            tar -czf $asset -C dist EasyMediaCompress
          }

          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: EasyMediaCompress-${{ github.ref_name }}-${{ matrix.platform }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.ref_name }}"
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          fi
          gh release create "$tag" \
            release-assets/* \
            --title "$tag" \
            --generate-notes
